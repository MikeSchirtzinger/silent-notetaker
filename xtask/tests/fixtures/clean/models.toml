# Clean fixture registry — used by xtask tests to verify the "pass" direction.
#
# All entries have:
#   - pinned revision (40-char commit SHA)
#   - files with sha256 + size
#   - non-empty license
#   - license_verified = true
#
# This is a minimal fixture; it does not represent real model content.

[[model]]
id = "asr.fixture.streaming_tiny"
task = "asr"
provider = "huggingface"
repo = "fixture-org/tiny-asr-model"
revision = "abc1234567890abcdef1234567890abcdef12345"
host = "rust-ort-web"
execution_provider = "cpu"
precision = ["int8"]
memory_budget_mb = 64
license = "MIT"
license_verified = true
network_origins = [
    "https://huggingface.co",
    "https://cdn-lfs.huggingface.co",
]

  [model.cache]
  store = "cache-api"
  verify_once_per_revision = true

  [[model.files]]
  path = "encoder_tiny.onnx"
  size = 1024
  sha256 = "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"
  purpose = "encoder"

  [[model.files]]
  path = "tokenizer.model"
  size = 512
  sha256 = "cafecafecafecafecafecafecafecafecafecafecafecafecafecafecafecafe"
  purpose = "tokenizer"

  [model.device_tiers]
  wasm_only = { default_for_tier = true }

