# Silent Notetaker — Hugging Face model registry (PRD R4)
#
# This file is the single source of truth: engine selection, CSP generation,
# egress manifest, license display, and cache verification all derive from it.
# Generated by Task D1 (d1-registry). Consumed by Task D2 (xtask model-audit /
# gen-headers / deploy-gate).
#
# IMPORTANT — license_verified:
#   All entries carry `license_verified = false`. A2's recommendation is
#   recorded in a comment on each entry. Mike must read the upstream license
#   and flip the flag himself; agents must not flip it.
#
# TOML note — cache MUST be a table form (`[model.cache] store = "..."`), not a
# bare string. The silent-core `Cache` struct deserializes from a table; the
# round-trip test (crates/silent-core/tests/registry_roundtrip.rs) validates
# this constraint.

# ─────────────────────────────────────────────────────────────────────────────
# 1. Nemotron — Streaming ASR, flagship Rust/ort-web engine
#    PRD host: rust-ort-web  execution: cpu  precision: int8
#    R9 budgets: TTFT ≤1000 ms (browser), RTF ≤0.5× (browser WASM), ≤0.2× (native)
#
# IMPORTANT — artifact provenance (currently unpinned / split-source):
#   The crate (`nemotron-asr`) expects three files in one directory:
#     encoder.onnx            — INT8, self-contained, ~881 MB, NO external .data
#     decoder_joint_fp32.onnx — FP32 LSTM decoder, ~36 MB, pure ai.onnx opset-17
#     tokenizer.model         — SentencePiece, ~251 KB
#
#   As of 2026-06-04 no single public HF repo hosts all three under these
#   exact names. The INT8 encoder (self-contained) lives in
#     lokkju/nemotron-speech-streaming-en-0.6b-int8  (and a copy in smcleod/…)
#   and the FP32 decoder (as decoder_joint.onnx, not decoder_joint_fp32.onnx)
#   lives in altunenes/parakeet-rs under nemotron-speech-streaming-en-0.6b/.
#   The tokenizer.model is identical across both (same LFS oid).
#
#   Action required (USER GATE — Mike):
#     Create a first-party HF repo (e.g. FluffyBunnies/nemotron-streaming-onnx)
#     hosting all three files under the exact names the crate expects.
#     A5-style rehost: verify hashes, add NVIDIA NOTICE file per license §3.1.
#     Then update repo/revision below.
#
#   Until then: repo/revision point at lokkju (best single-source for encoder
#   + tokenizer), with the decoder_joint_fp32.onnx BLOCKED note below.
#
# A2 verdict: GO — NVIDIA Open Model License §3, redistribution permitted;
#   NOTICE file required ("Licensed by NVIDIA Corporation under the NVIDIA
#   Open Model License"). Nemotron re-host repo must include this notice.
# ─────────────────────────────────────────────────────────────────────────────
[[model]]
id = "asr.nemotron.streaming_0_6b"
task = "asr"
provider = "huggingface"
# BLOCKED-ON-USER-GATE: Mike creates first-party repo with all three files
# under exact names the crate expects. lokkju repo used as interim pin for
# encoder + tokenizer hashes; decoder is in altunenes/parakeet-rs (see notes).
repo = "lokkju/nemotron-speech-streaming-en-0.6b-int8"
revision = "95df6c82aa796a3fc793f87633dcdb017ac12c07"
host = "rust-ort-web"
execution_provider = "cpu"   # FINDINGS.md: CPU beats WebGPU for this model class
precision = ["int8"]
memory_budget_mb = 1400      # 881 MB encoder + 36 MB decoder + ORT overhead
license = "nvidia-open-model-license"
license_verified = false     # A2 verdict: GO — NVIDIA Open Model License §3, NOTICE required
network_origins = ["https://huggingface.co", "https://cdn-lfs.huggingface.co"]

  [model.cache]
  store = "cache-api"
  verify_once_per_revision = true

  # encoder.onnx — INT8, self-contained (~881 MB), no external .data file.
  # Source: lokkju/nemotron-speech-streaming-en-0.6b-int8 @ 95df6c8
  [[model.files]]
  path = "encoder.onnx"
  size = 880555453
  sha256 = "d24be4aff18dd9d2aa3433cb89c5a457df5015abf79e06a63dde76b1cd6386bb"
  purpose = "encoder"

  # decoder_joint_fp32.onnx — FP32 LSTM decoder (~36 MB), pure ai.onnx opset-17.
  # BLOCKED-ON-USER-GATE: first-party repo must rename decoder_joint.onnx →
  # decoder_joint_fp32.onnx. Source for hashes:
  #   altunenes/parakeet-rs @ a95331a, path nemotron-speech-streaming-en-0.6b/decoder_joint.onnx
  # LFS oid (sha256): 8bcfde85fa9039a70caeb90204273f837923d63a706c186bd33e2ada25a91700
  [[model.files]]
  path = "decoder_joint_fp32.onnx"
  size = 35779240
  sha256 = "8bcfde85fa9039a70caeb90204273f837923d63a706c186bd33e2ada25a91700"
  purpose = "decoder"

  # tokenizer.model — SentencePiece, identical across lokkju + altunenes repos.
  [[model.files]]
  path = "tokenizer.model"
  size = 251056
  sha256 = "07d4e5a63840a53ab2d4d106d2874768143fb3fbdd47938b3910d2da05bfb0a9"
  purpose = "tokenizer"

  # Device tiers: Nemotron is the CPU/WASM default for all non-WebGPU tiers
  # (the whole point of pairing it with Qwen-on-WebGPU).
  [model.device_tiers.wasm_only]
  default_for_tier = true

  [model.device_tiers.webgpu_low]
  default_for_tier = true

  [model.validation]
  golden_fixtures = ["nemotron/test_16k"]
  expected = "100% word accuracy on the golden clip (6.03 s, say-synthesized)"

  # R9 performance budgets (measured baselines — PRD §R9).
  [model.perf_budget]
  ttft_ms_max = 1000         # measured ~650 ms after edge-guard fix (2026-06-04)
  rtf_browser_max = 0.5      # measured ~0.28–0.5× browser WASM
  rtf_native_max = 0.2       # measured 0.139× native (4 threads, M1 Pro)
  flat_memory_10min = true

