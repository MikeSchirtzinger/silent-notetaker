# The wasm-bindgen boundary between the Silent Notetaker UI and the Rust core
# (PRD Phase 2, Task F2: diarization surface).
#
# This crate exposes the diarization subsystem (TitaNet embedder +
# SpeakerTracker) to the UI via wasm-bindgen. It compiles with wasm-pack for the
# browser target; the native target remains valid so `cargo check --workspace`
# passes without wasm-pack being invoked.
#
# TypeScript bindings for the boundary types are generated from `silent-core`
# (A3 decision — type generation is decoupled from the wasm build). This crate
# is the RUNTIME boundary; `silent-core` owns the type contract.
[package]
name = "silent-web"
version = "0.1.0"
description = "The wasm-bindgen boundary between the Silent Notetaker UI and the Rust core."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lib]
# `cdylib` for wasm-pack; `rlib` for native cargo check + tests.
# Mirrors nemotron-asr and silent-diarization.
crate-type = ["cdylib", "rlib"]

[lints]
workspace = true

[dependencies]
silent-core = { path = "../silent-core" }
silent-diarization = { path = "../silent-diarization" }
silent-notes = { path = "../silent-notes" }
serde = { workspace = true }
serde_json = { workspace = true }
# Crash-diagnostics subscriber (PRD Phase 5, Appendix A row 34). `tracing` +
# `tracing-subscriber` are browser-free, so the `DiagLayer` translation logic
# compiles and is unit-tested on the NATIVE target (driving an in-memory
# `StorageSink`); only the `LocalStorageSink` (web-sys Storage) is wasm32-only.
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
# Native tests drive the DiagLayer through a tracing dispatch and read back the
# rows; serde_json serializes them to assert byte-identity vs the silent-core
# golden fixture.
serde_json = { workspace = true }
tracing = { workspace = true }

# ---------------------------------------------------------------------------
# wasm32 — wasm-bindgen surface. Only needed for the browser target.
# ---------------------------------------------------------------------------
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
# `Storage`/`Window` back the `LocalStorageSink` (the real `notetakerDiag`
# read/write); `Performance` gives `performance.now()` for the `put` event clock.
# `performance.memory` is read via `js_sys::Reflect` (it is a non-standard
# Chromium field) so we do not need the `Memory` web-sys feature, which would
# force a web-sys/js-sys minor bump that conflicts with the ort-web pin.
web-sys = { version = "0.3", features = [
    "console",
    "Window",
    "Storage",
    "Performance",
] }
console_error_panic_hook = "0.1"
# The Nemotron ASR engine (ort-web RNN-T). Wasm32-only: the `nemotron` module
# wraps `WasmAsr` behind the typed `EngineEvent` boundary (Task w4). nemotron-asr
# keeps its own RC pins for `ort`/`ort-web`; depending on it here only on wasm32
# keeps the native `cargo check` free of an ort-web link.
nemotron-asr = { path = "../nemotron-asr" }
