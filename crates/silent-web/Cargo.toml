# Stub crate (Phase 1 scaffold). Implemented in Phase 3+ (Tasks G3/I*): the
# wasm-bindgen boundary that exposes silent-core commands/events to the UI and
# drives the host workers. The TypeScript bindings themselves are generated from
# silent-core's types (ts-rs) via `cargo test -p silent-core export_bindings`
# (A3 decision) — silent-web is the runtime boundary, silent-core owns the type
# definitions. wasm-bindgen + ort-web glue are added when the boundary lands; the
# stub stays dependency-light so the native workspace check is fast.
[package]
name = "silent-web"
version = "0.1.0"
description = "The wasm-bindgen boundary between the Silent Notetaker UI and the Rust core. Stub pending Phase 3."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lints]
workspace = true

[dependencies]
silent-core = { path = "../silent-core" }
