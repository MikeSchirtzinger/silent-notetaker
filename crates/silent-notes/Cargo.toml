# Notes / smart-questions / word-correction policy (Phase 3, Tasks G1–G4).
#
# G1: the NoteExtractor trigger policy ported byte-identically from the
# index.html `NoteEngine` regexes + the `OpenQs` open-question tracker, pinned by
# the goldens in `goldens/extractor/` (generated by `goldens/gen/notes_ref.mjs`).
# G2: smart-question scheduling + the Qwen chunk/dedup/`TAG|` final-notes
# pipeline driving the Qwen worker (question-worker.js) over the typed boundary.
# The note command/event TYPES live in `silent-core` (the typed UI boundary).
# Pure Rust policy: no model, no DOM, deterministically testable without a
# browser (PRD R2); the worker stays the executor.
[package]
name = "silent-notes"
version = "0.1.0"
description = "Notes, smart-questions, and word-correction policy for Silent Notetaker (NoteExtractor trigger policy + open-question tracking + smart-questions + Qwen final-notes)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lints]
workspace = true

[dependencies]
silent-core = { path = "../silent-core" }
# `regex` compiles the trigger patterns. `default-features` are kept (unicode
# tables) — the patterns are ASCII but `\b`/`\w` semantics must match the JS
# engine on the BMP text these heuristics see. `regex` builds for
# wasm32-unknown-unknown (no std::time/threads on this path), so the trigger
# policy runs in the browser unchanged.
regex = "1"

[dev-dependencies]
# Golden tests load JSON fixtures replayed by `tests/extractor_golden.rs` and the
# question/qwen golden tests, generated by the DOM-free JS reference generators
# in `goldens/*/` to prove byte-identical parity with the shipping index.html.
serde = { workspace = true }
serde_json = { workspace = true }
