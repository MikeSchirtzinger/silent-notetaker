# Phase 3 (Tasks G1–G4): the NoteExtractor trigger policy (byte-identical
# goldens from the current regexes), open-question tracking, word-correction
# application, and smart-question scheduling + the Qwen chunk/dedup/TAG| pipeline
# driving the Qwen worker over the typed boundary. Pure Rust policy; the worker
# (question-worker.js) stays the executor.
[package]
name = "silent-notes"
version = "0.1.0"
description = "Notes, smart-questions, and word-correction policy for Silent Notetaker."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lints]
workspace = true

[dependencies]
silent-core = { path = "../silent-core" }

[dev-dependencies]
# Golden tests load JSON fixtures generated by the DOM-free JS reference
# generators in `goldens/*/reference/` to prove byte-identical parity with the
# shipping index.html behavior.
serde = { workspace = true }
serde_json = { workspace = true }
